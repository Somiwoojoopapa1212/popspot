name: SW 버전 자동 갱신
on:
  push:
    branches: [main]
    paths-ignore: ['sw.js']
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: SW 버전 타임스탬프 갱신
        run: |
          TS=$(date -u +"%Y-%m-%dT%H:%M:%S")
          sed -i "s|// v:.*|// v:${TS}|g" sw.js
          sed -i "s|'popspot-v:.*'|'popspot-v:${TS}'|g" sw.js
      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet || git commit -m "chore: SW 버전 갱신 [skip ci]"
          git push
